<?xml version="1.0" encoding="UTF-8"?>
<!-- Jamodio V5 app icon — square 1024x1024.
     Fond foncé rond + onde V5 + centre jaune (match site web + UI agent). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded square background (macOS-style squircle) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#0e0f11"/>

  <!-- V5 waveform group — centred, scaled -->
  <g transform="translate(512 512) scale(8.2) translate(-50 -50)">
    <g fill="none" stroke="#e8ff3a" stroke-linecap="round">
      <path d="M 10 50 Q 30 22 50 50 Q 70 78 90 50" stroke-width="2.5" opacity="0.5"/>
      <path d="M 10 50 Q 30 36 50 50 Q 70 64 90 50" stroke-width="5"/>
    </g>
    <circle cx="50" cy="50" r="15" fill="#0e0f11" stroke="#e8ff3a" stroke-width="3"/>
    <circle cx="50" cy="50" r="9" fill="#e8ff3a"/>
    <circle cx="50" cy="50" r="4" fill="#0e0f11"/>
  </g>
</svg>
